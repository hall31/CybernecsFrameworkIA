apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: startup-app-hpa
  namespace: default
  labels:
    app: startup-app
    version: v1
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: startup-app-deployment
  minReplicas: 2
  maxReplicas: 20
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 300
      policies:
      - type: Percent
        value: 100
        periodSeconds: 15
      - type: Pods
        value: 4
        periodSeconds: 15
      selectPolicy: Max
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
      - type: Percent
        value: 10
        periodSeconds: 60
      - type: Pods
        value: 2
        periodSeconds: 60
      selectPolicy: Min
---
apiVersion: v1
kind: Service
metadata:
  name: startup-app-service
  namespace: default
  labels:
    app: startup-app
spec:
  type: ClusterIP
  ports:
  - port: 80
    targetPort: 8080
    protocol: TCP
    name: http
  selector:
    app: startup-app
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: startup-app-ingress
  namespace: default
  annotations:
    kubernetes.io/ingress.class: nginx
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "300"
spec:
  tls:
  - hosts:
    - startup123.app
    - www.startup123.app
    secretName: startup123-tls
  rules:
  - host: startup123.app
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: startup-app-service
            port:
              number: 80
  - host: www.startup123.app
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: startup-app-service
            port:
              number: 80